    <h1>Pan Cubano Bread Recipe</h1>
    <h2>Description:</h2>
    <p> This is a simple bread recipe to make some Pan Cubano bread.</p>
    <h2>Ingredients:</h2>
    <ul>
        <li>480g bread flour</li>
        <li>260g water</li>
        <li>56g lard</li>
        <li>12g salt</li>
        <li>8g sugar</li>
        <li>7.5g instant yeast</li>
        <li>4g dried rosemary</li>
    </ul>
